<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open in Apollo</title>
</head>
<body style="background:#000;color:#fff;font-family:-apple-system,Helvetica,Arial;text-align:center;padding-top:80px">
<script>
// Mirrors what openinapollo.com did: read the query params that Apollo's Safari
// extension (content.js) sends, and bounce to the apollo:// deep link so the
// sideloaded Apollo opens the exact post/subreddit.
(function () {
  var p = new URLSearchParams(window.location.search);
  var subreddit = p.get("subreddit");
  var postID = p.get("postID");
  var commentID = p.get("commentID");
  var context = p.get("context");

  var dest = null;
  if (subreddit && postID && commentID && context) {
    dest = "apollo://reddit.com/r/" + subreddit + "/comments/" + postID + "/_/" + commentID + "/?context=" + context;
  } else if (subreddit && postID && commentID) {
    dest = "apollo://reddit.com/r/" + subreddit + "/comments/" + postID + "/_/" + commentID;
  } else if (subreddit && postID) {
    dest = "apollo://reddit.com/r/" + subreddit + "/comments/" + postID;
  } else if (subreddit) {
    dest = "apollo://reddit.com/r/" + subreddit;
  }

  if (dest) {
    window.location.replace(dest);
  }
})();
</script>
<h2>Opening in Apollo…</h2>
<p style="opacity:.6">If nothing happens, tap the link your extension generated.</p>
</body>
</html>
